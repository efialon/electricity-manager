<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="חשמל חכם" />
  <title>מנהל חשמל חכם</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 3px; }
    input[type=month] { color-scheme: dark; }
    @media (max-width: 600px) { .nl { display: none; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const SK = 'elec_v4';

function load() {
  try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e) {}
  return null;
}
function save(d) {
  try { localStorage.setItem(SK, JSON.stringify(d)); } catch(e) {}
}

const DEF_TARIFF = { rate: 0.6402, name: 'תעריף חי - חברת חשמל 2026' };
const DEF_TENANTS = [
  { id:1, name:'אורי ספיר', phone:'972545579599', unit:'דירה 1', active:true, lastReading:25568 },
  { id:2, name:'טל',        phone:'972542388318', unit:'דירה 2', active:true, lastReading:22722 },
  { id:3, name:'ארד',       phone:'972000000000', unit:'דירה 3', active:true, lastReading:18008 },
];

const ils = n => '₪' + Number(n).toFixed(2);
const calc = (prev, curr, rate) => {
  const usage = parseFloat((curr - prev).toFixed(2));
  return { usage, cost: parseFloat((usage * rate).toFixed(2)) };
};

function App() {
  const saved = load();
  const [page, setPage]     = useState('dash');
  const [tenants, setTen]   = useState(saved?.tenants || DEF_TENANTS);
  const [tariff, setTariff] = useState(saved?.tariff  || DEF_TARIFF);
  const [reads, setReads]   = useState({});
  const [log, setLog]       = useState(saved?.log || []);
  const [editT, setEditT]   = useState(null);
  const [newT, setNewT]     = useState({ name:'', phone:'', unit:'' });
  const [month, setMonth]   = useState('');
  const [modal, setModal]   = useState(false);
  const [editR, setEditR]   = useState(false);
  const [tmpR, setTmpR]     = useState(tariff);
  const [toast, setToast]   = useState(null);

  useEffect(() => {
    const n = new Date();
    setMonth(`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`);
  }, []);

  useEffect(() => { save({ tenants, tariff, log }); }, [tenants, tariff, log]);

  const toast2 = (msg, type='ok') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  const buildMsg = (t, c, mo) => {
    const lines = [
      `⚡ התקזזויות חשמל - ${mo}`,
      '',
      `שלום ${t.name}!`,
      'נא לשלוח צילום מונה החשמל שלך.',
      '',
    ];
    if (c) {
      lines.push('📊 חישוב חודש קודם:');
      lines.push(`• קריאה קודמת: ${t.lastReading} קוט"ש`);
      lines.push(`• קריאה נוכחית: ${c.curr} קוט"ש`);
      lines.push(`• צריכה: ${c.usage} קוט"ש`);
      lines.push(`• תעריף: ${ils(tariff.rate)} לקוט"ש`);
      lines.push(`• 💰 לתשלום: ${ils(c.cost)}`);
    } else {
      lines.push(`קריאה קודמת: ${t.lastReading} קוט"ש`);
      lines.push('(אין קריאה חדשה עדיין)');
    }
    lines.push('', 'תודה! 🙏');
    return lines.join('\n');
  };

  const sendWA = (phone, msg) => {
    const p = phone.replace(/[\s\-+]/g, '');
    window.open(`https://api.whatsapp.com/send?phone=${p}&text=${encodeURIComponent(msg)}`, '_blank');
  };

  const doTrigger = () => {
    const entries = [];
    tenants.filter(t => t.active).forEach(t => {
      const cv = reads[t.id] ? Number(reads[t.id]) : null;
      const c = cv && cv > t.lastReading ? { ...calc(t.lastReading, cv, tariff.rate), curr: cv } : null;
      const msg = buildMsg(t, c, month);
      entries.push({ id: Date.now()+t.id, name: t.name, unit: t.unit, phone: t.phone, month, msg, c, prev: t.lastReading, sent: new Date().toLocaleString('he-IL') });
    });
    setTen(prev => prev.map(t => {
      const cv = reads[t.id] ? Number(reads[t.id]) : null;
      return cv && cv > t.lastReading ? { ...t, lastReading: cv } : t;
    }));
    setReads({});
    setLog(prev => [...entries, ...prev]);
    toast2(`${entries.length} הודעות מוכנות!`);
    setModal(false);
    setPage('log');
  };

  const active = tenants.filter(t => t.active);

  const C = {
    page:  { minHeight:'100vh', background:'#0a0a0f', color:'#e8e8ff' },
    bg:    { position:'fixed', inset:0, background:'radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, #001a33 0%, transparent 60%)', pointerEvents:'none', zIndex:0 },
    hdr:   { position:'sticky', top:0, zIndex:50, borderBottom:'1px solid rgba(120,80,255,0.2)', background:'rgba(10,10,20,0.92)', backdropFilter:'blur(20px)', padding:'0 16px' },
    hi:    { display:'flex', alignItems:'center', justifyContent:'space-between', height:56 },
    main:  { position:'relative', zIndex:1, maxWidth:800, margin:'0 auto', padding:'20px 16px 100px' },
    card:  { background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:16, padding:20 },
    cardH: { background:'linear-gradient(135deg,rgba(124,58,237,0.12),rgba(6,182,212,0.08))', border:'1px solid rgba(124,58,237,0.25)', borderRadius:16, padding:20 },
    h1:    { fontSize:26, fontWeight:800, marginBottom:6, background:'linear-gradient(90deg,#a78bfa,#06b6d4)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' },
    sub:   { color:'#6b7280', fontSize:13, marginBottom:20 },
    inp:   { width:'100%', padding:'10px 14px', borderRadius:10, border:'1px solid rgba(255,255,255,0.1)', background:'rgba(255,255,255,0.05)', color:'#e8e8ff', fontSize:14, outline:'none', fontFamily:'inherit', boxSizing:'border-box' },
    btn:   { padding:'11px 20px', borderRadius:10, border:'none', fontWeight:700, cursor:'pointer', fontFamily:'inherit', fontSize:14 },
    bP:    { background:'linear-gradient(135deg,#7c3aed,#06b6d4)', color:'#fff' },
    bG:    { background:'transparent', color:'#9ca3af', border:'1px solid rgba(255,255,255,0.1)' },
    bOK:   { background:'#10b981', color:'#fff' },
    bWA:   { background:'#25d366', color:'#fff' },
    bX:    { background:'transparent', color:'#f87171', border:'1px solid rgba(248,113,113,0.2)' },
    nav:   a => ({ padding:'8px 12px', borderRadius:8, border:'none', cursor:'pointer', fontFamily:'inherit', fontSize:13, fontWeight:600, background:a?'rgba(124,58,237,0.25)':'transparent', color:a?'#a78bfa':'#9ca3af', borderBottom:a?'2px solid #7c3aed':'2px solid transparent' }),
    pill:  c => ({ display:'inline-block', padding:'3px 10px', borderRadius:20, fontSize:11, fontWeight:700, background:c+'22', color:c }),
  };

  const tabs = [
    { id:'dash', label:'בקרה',     icon:'⚡' },
    { id:'ten',  label:'דיירים',   icon:'👥' },
    { id:'tar',  label:'תעריף',    icon:'💰' },
    { id:'log',  label:'היסטוריה', icon:'📋' },
  ];

  return (
    <div style={C.page}>
      <div style={C.bg} />

      {toast && (
        <div style={{ position:'fixed', top:16, left:'50%', transform:'translateX(-50%)', background:toast.type==='ok'?'#059669':'#dc2626', color:'#fff', padding:'10px 24px', borderRadius:50, fontWeight:700, zIndex:9999, fontSize:14, whiteSpace:'nowrap', boxShadow:'0 4px 24px rgba(0,0,0,0.5)' }}>
          {toast.msg}
        </div>
      )}

      <header style={C.hdr}>
        <div style={C.hi}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:34, height:34, background:'linear-gradient(135deg,#7c3aed,#06b6d4)', borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', fontSize:17 }}>⚡</div>
            <span style={{ fontWeight:800, fontSize:16 }}>מנהל חשמל חכם</span>
          </div>
          <nav style={{ display:'flex', gap:2 }}>
            {tabs.map(n => (
              <button key={n.id} onClick={() => setPage(n.id)} style={C.nav(page===n.id)}>
                {n.icon} <span className="nl">{n.label}</span>
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main style={C.main}>

        {/* DASHBOARD */}
        {page === 'dash' && (
          <div>
            <h1 style={C.h1}>לוח בקרה</h1>
            <p style={C.sub}>ניהול התקזזויות חשמל חודשי לדיירים</p>

            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:20 }}>
              {[
                { label:'דיירים פעילים', value:active.length,      color:'#7c3aed' },
                { label:'הודעות שנשלחו', value:log.length,         color:'#06b6d4' },
                { label:'תעריף',         value:ils(tariff.rate),   color:'#10b981' },
              ].map((s,i) => (
                <div key={i} style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:14, padding:16 }}>
                  <div style={{ fontSize:10, color:'#6b7280', marginBottom:4 }}>{s.label}</div>
                  <div style={{ fontSize:17, fontWeight:800, color:s.color }}>{s.value}</div>
                </div>
              ))}
            </div>

            <div style={{ ...C.cardH, marginBottom:16 }}>
              <h2 style={{ fontSize:17, fontWeight:700, marginBottom:8 }}>🚀 שלח טריגר חודשי</h2>
              <p style={{ color:'#9ca3af', fontSize:13, marginBottom:14 }}>שלח בקשת התקזזויות לכל הדיירים</p>
              <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
                <input type="month" value={month} onChange={e => setMonth(e.target.value)} style={{ ...C.inp, flex:1, minWidth:140, width:'auto' }} />
                <button onClick={() => setModal(true)} style={{ ...C.btn, ...C.bP, flex:1, minWidth:150 }}>⚡ שלח התקזזויות</button>
              </div>
            </div>

            <div style={C.card}>
              <h3 style={{ fontSize:15, fontWeight:700, marginBottom:14 }}>📷 הזנת קריאות מונה</h3>
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {active.map(t => {
                  const cv = reads[t.id] ? Number(reads[t.id]) : null;
                  const c  = cv && cv > t.lastReading ? calc(t.lastReading, cv, tariff.rate) : null;
                  return (
                    <div key={t.id} style={{ background:'rgba(255,255,255,0.03)', borderRadius:12, padding:'12px 14px' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                        <span style={{ fontWeight:600 }}>{t.name} <span style={{ color:'#6b7280', fontSize:12 }}>{t.unit}</span></span>
                        <span style={{ color:'#6b7280', fontSize:12 }}>קודם: {t.lastReading}</span>
                      </div>
                      <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                        <input type="number" placeholder="קריאה נוכחית" value={reads[t.id]||''}
                          onChange={e => setReads(r => ({...r, [t.id]: e.target.value}))}
                          style={{ ...C.inp, textAlign:'center' }} />
                        {c && <span style={{ color:'#10b981', fontWeight:800, fontSize:16, whiteSpace:'nowrap' }}>{ils(c.cost)}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* TENANTS */}
        {page === 'ten' && (
          <div>
            <h1 style={C.h1}>👥 ניהול דיירים</h1>
            <div style={{ ...C.card, marginBottom:16 }}>
              <h3 style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>➕ הוסף דייר חדש</h3>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                <input placeholder="שם הדייר" value={newT.name} onChange={e => setNewT(n=>({...n,name:e.target.value}))} style={C.inp} />
                <input placeholder="מספר דירה" value={newT.unit} onChange={e => setNewT(n=>({...n,unit:e.target.value}))} style={C.inp} />
                <input placeholder="טלפון (972501234567)" value={newT.phone} onChange={e => setNewT(n=>({...n,phone:e.target.value}))} style={C.inp} type="tel" />
                <button onClick={() => {
                  if (!newT.name || !newT.phone) { toast2('נא למלא שם וטלפון','err'); return; }
                  setTen(p => [...p, { ...newT, id:Date.now(), active:true, lastReading:0 }]);
                  setNewT({ name:'', phone:'', unit:'' });
                  toast2('דייר נוסף');
                }} style={{ ...C.btn, ...C.bP, width:'100%' }}>הוסף דייר</button>
              </div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {tenants.map(t => (
                <div key={t.id} style={{ ...C.card, opacity:t.active?1:0.4 }}>
                  {editT?.id === t.id ? (
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                      <input value={editT.name}  onChange={e => setEditT(x=>({...x,name:e.target.value}))}  style={C.inp} placeholder="שם" />
                      <input value={editT.unit}  onChange={e => setEditT(x=>({...x,unit:e.target.value}))}  style={C.inp} placeholder="דירה" />
                      <input value={editT.phone} onChange={e => setEditT(x=>({...x,phone:e.target.value}))} style={C.inp} placeholder="טלפון" />
                      <input type="number" value={editT.lastReading} onChange={e => setEditT(x=>({...x,lastReading:Number(e.target.value)}))} style={C.inp} placeholder="קריאה אחרונה" />
                      <div style={{ display:'flex', gap:8 }}>
                        <button onClick={() => { setTen(p => p.map(x => x.id===editT.id?editT:x)); setEditT(null); toast2('עודכן'); }} style={{ ...C.btn, ...C.bOK, flex:1 }}>שמור</button>
                        <button onClick={() => setEditT(null)} style={{ ...C.btn, ...C.bG }}>ביטול</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                        <div>
                          <div style={{ fontWeight:700, fontSize:15 }}>{t.name}</div>
                          <div style={{ color:'#6b7280', fontSize:13 }}>{t.unit}</div>
                        </div>
                        {t.active && (
                          <div style={{ display:'flex', gap:6 }}>
                            <button onClick={() => setEditT({...t})} style={{ ...C.btn, ...C.bG, padding:'6px 12px', fontSize:12 }}>✏️</button>
                            <button onClick={() => { setTen(p=>p.map(x=>x.id===t.id?{...x,active:false}:x)); toast2('הוסר'); }} style={{ ...C.btn, ...C.bX, padding:'6px 12px', fontSize:12 }}>🗑️</button>
                          </div>
                        )}
                      </div>
                      <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                        <span style={C.pill('#06b6d4')}>📱 {t.phone}</span>
                        <span style={C.pill('#a78bfa')}>מונה: {t.lastReading}</span>
                        {!t.active && <span style={C.pill('#f87171')}>לא פעיל</span>}
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TARIFF */}
        {page === 'tar' && (
          <div>
            <h1 style={C.h1}>💰 הגדרות תעריף</h1>
            <p style={C.sub}>תעריף חי - חברת חשמל ישראל</p>
            <div style={{ ...C.card, maxWidth:460, marginBottom:16 }}>
              <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
                <div>
                  <label style={{ fontSize:12, color:'#9ca3af', display:'block', marginBottom:6 }}>שם התעריף</label>
                  {editR ? <input value={tmpR.name} onChange={e=>setTmpR(x=>({...x,name:e.target.value}))} style={C.inp} />
                         : <div style={{ fontWeight:600 }}>{tariff.name}</div>}
                </div>
                <div>
                  <label style={{ fontSize:12, color:'#9ca3af', display:'block', marginBottom:6 }}>מחיר לקוט"ש</label>
                  {editR ? <input type="number" step="0.0001" value={tmpR.rate} onChange={e=>setTmpR(x=>({...x,rate:parseFloat(e.target.value)}))} style={C.inp} />
                         : <div style={{ fontWeight:800, fontSize:28, color:'#10b981' }}>{ils(tariff.rate)} <span style={{ fontSize:14, fontWeight:400, color:'#6b7280' }}>לקוט"ש</span></div>}
                </div>
                {editR ? (
                  <div style={{ display:'flex', gap:8 }}>
                    <button onClick={() => { setTariff(tmpR); setEditR(false); toast2('תעריף עודכן'); }} style={{ ...C.btn, ...C.bOK, flex:1 }}>שמור</button>
                    <button onClick={() => { setEditR(false); setTmpR(tariff); }} style={{ ...C.btn, ...C.bG }}>ביטול</button>
                  </div>
                ) : (
                  <button onClick={() => { setEditR(true); setTmpR(tariff); }} style={{ ...C.btn, background:'rgba(124,58,237,0.12)', color:'#a78bfa', border:'1px solid rgba(124,58,237,0.3)', width:'100%' }}>✏️ עדכן תעריף</button>
                )}
              </div>
            </div>
            <div style={{ ...C.card, maxWidth:460 }}>
              <h3 style={{ fontSize:15, fontWeight:700, marginBottom:14 }}>🧮 מחשבון מהיר</h3>
              <CalcDemo rate={tariff.rate} ils={ils} calc={calc} />
            </div>
          </div>
        )}

        {/* LOG */}
        {page === 'log' && (
          <div>
            <h1 style={C.h1}>📋 היסטוריית שליחות</h1>
            {log.length === 0 ? (
              <div style={{ textAlign:'center', padding:'60px 20px', color:'#6b7280' }}>
                <div style={{ fontSize:48, marginBottom:12 }}>📭</div>
                <p>עדיין לא נשלחו הודעות</p>
              </div>
            ) : log.map(entry => (
              <div key={entry.id} style={{ ...C.card, marginBottom:14 }}>
                <div style={{ display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:8, marginBottom:12 }}>
                  <div>
                    <span style={{ fontWeight:700, fontSize:15 }}>{entry.name}</span>
                    <span style={{ color:'#6b7280', fontSize:12, marginRight:8 }}>{entry.unit} • {entry.month}</span>
                  </div>
                  {entry.c && <span style={{ color:'#10b981', fontWeight:800, fontSize:16 }}>{ils(entry.c.cost)}</span>}
                </div>
                {entry.c && (
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8, background:'rgba(255,255,255,0.03)', borderRadius:10, padding:'10px 12px', marginBottom:12 }}>
                    {[
                      { label:'קריאה קודמת', val:String(entry.prev) },
                      { label:'קריאה נוכחית', val:String(entry.c.curr) },
                      { label:'צריכה', val:`${entry.c.usage} קוט"ש` },
                      { label:'לתשלום', val:ils(entry.c.cost), green:true },
                    ].map((x,i) => (
                      <div key={i}>
                        <div style={{ fontSize:10, color:'#6b7280' }}>{x.label}</div>
                        <div style={{ fontWeight:700, color:x.green?'#10b981':'#e8e8ff', fontSize:x.green?16:13 }}>{x.val}</div>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ background:'#000', borderRadius:10, padding:'10px 14px', fontSize:12, color:'#9ca3af', whiteSpace:'pre-wrap', lineHeight:1.8, marginBottom:12 }}>
                  {entry.msg}
                </div>
                <button onClick={() => sendWA(entry.phone, entry.msg)} style={{ ...C.btn, ...C.bWA, width:'100%', fontSize:15 }}>
                  📱 שלח ב-WhatsApp ל-{entry.name}
                </button>
                <div style={{ marginTop:8, fontSize:11, color:'#4b5563' }}>נוצר: {entry.sent}</div>
              </div>
            ))}
          </div>
        )}
      </main>

      {modal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', backdropFilter:'blur(8px)', zIndex:100, display:'flex', alignItems:'flex-end', justifyContent:'center', padding:16 }}>
          <div style={{ background:'#111827', border:'1px solid rgba(124,58,237,0.4)', borderRadius:20, padding:24, width:'100%', maxWidth:460, marginBottom:8 }}>
            <h2 style={{ fontWeight:800, fontSize:19, marginBottom:6 }}>⚡ שלח התקזזויות חשמל</h2>
            <p style={{ color:'#6b7280', fontSize:13, marginBottom:16 }}>הודעות ל-{active.length} דיירים פעילים</p>
            <div style={{ background:'rgba(255,255,255,0.03)', borderRadius:12, padding:14, marginBottom:16 }}>
              {active.map(t => {
                const cv = reads[t.id] ? Number(reads[t.id]) : null;
                const c  = cv && cv > t.lastReading ? calc(t.lastReading, cv, tariff.rate) : null;
                return (
                  <div key={t.id} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid rgba(255,255,255,0.05)', fontSize:14 }}>
                    <span>{t.name} <span style={{ color:'#6b7280', fontSize:12 }}>({t.unit})</span></span>
                    <span style={{ color:c?'#10b981':'#6b7280', fontWeight:700 }}>{c ? ils(c.cost) : 'ללא קריאה'}</span>
                  </div>
                );
              })}
            </div>
            <p style={{ color:'#9ca3af', fontSize:12, marginBottom:14, textAlign:'center' }}>לאחר האישור תועבר להיסטוריה לשלוח לכל דייר</p>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={doTrigger} style={{ ...C.btn, ...C.bP, flex:1, fontSize:16, padding:13 }}>✅ אשר</button>
              <button onClick={() => setModal(false)} style={{ ...C.btn, ...C.bG, padding:13 }}>ביטול</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CalcDemo({ rate, ils, calc }) {
  const [p, setP] = useState(18000);
  const [c, setC] = useState(18200);
  const res = c > p ? calc(p, c, rate) : null;
  const inp = { width:'100%', padding:'9px 12px', borderRadius:8, border:'1px solid rgba(255,255,255,0.1)', background:'rgba(255,255,255,0.05)', color:'#e8e8ff', fontSize:14, outline:'none', fontFamily:'inherit', boxSizing:'border-box' };
  return (
    <div>
      <div style={{ display:'flex', gap:10, marginBottom:12 }}>
        {[{l:'קריאה קודמת',v:p,s:setP},{l:'קריאה נוכחית',v:c,s:setC}].map(f=>(
          <div key={f.l} style={{ flex:1 }}>
            <label style={{ fontSize:12, color:'#9ca3af', display:'block', marginBottom:4 }}>{f.l}</label>
            <input type="number" value={f.v} onChange={e=>f.s(Number(e.target.value))} style={inp} />
          </div>
        ))}
      </div>
      {res && (
        <div style={{ background:'rgba(16,185,129,0.1)', border:'1px solid rgba(16,185,129,0.25)', borderRadius:12, padding:14 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, fontSize:13 }}>
            <div>צריכה: <strong>{res.usage} קוט"ש</strong></div>
            <div>תעריף: <strong>{ils(rate)}</strong></div>
            <div style={{ color:'#10b981', fontWeight:800, fontSize:20, gridColumn:'span 2' }}>לתשלום: {ils(res.cost)}</div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
