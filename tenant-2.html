<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>קריאת מונה חשמל</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#0a0a0f; font-family:'Segoe UI',Tahoma,Arial,sans-serif; color:#e8e8ff; min-height:100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const WORKER_URL = "https://elecmeter.efialon.workers.dev";

const TENANTS = {
  "uri":  { name:"אורי ספיר",  unit:"דירה 1", lastReading:25568, rate:0.6402 },
  "tal":  { name:"טל",         unit:"דירה 2", lastReading:22722, rate:0.6402 },
  "arad": { name:"ארד",        unit:"דירה 3", lastReading:18008, rate:0.6402 },
};

const ils = n => '₪' + Number(n).toFixed(2);

function App() {
  const params = new URLSearchParams(window.location.search);
  const tenant = TENANTS[params.get('t') || ''];

  const [img, setImg]           = useState(null);
  const [b64, setB64]           = useState(null);
  const [scanning, setScanning] = useState(false);
  const [result, setResult]     = useState(null);
  const [error, setError]       = useState(null);
  const fileRef = useRef();

  const onFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImg(URL.createObjectURL(file));
    setResult(null); setError(null);
    const r = new FileReader();
    r.onload = ev => setB64(ev.target.result.split(',')[1]);
    r.readAsDataURL(file);
  };

  const doScan = async () => {
    if (!b64) return;
    setScanning(true); setError(null);
    try {
      const resp = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
              { type: 'text', text: 'This is an electricity meter display. Read the number shown. Return ONLY the number with decimals, nothing else. Example: 25914.94' }
            ]
          }]
        })
      });
      const data = await resp.json();
      const raw = data.content?.[0]?.text?.trim();
      const num = parseFloat(raw?.replace(/[^\d.]/g,''));
      if (isNaN(num)) throw new Error('לא הצלחתי לקרוא את המונה, נסה שוב');
      const usage = parseFloat((num - tenant.lastReading).toFixed(2));
      if (usage <= 0) throw new Error('הקריאה נמוכה מהקריאה הקודמת');
      const cost = parseFloat((usage * tenant.rate).toFixed(2));
      setResult({ reading: num, usage, cost });
    } catch(e) {
      setError(e.message);
    }
    setScanning(false);
  };

  const S = {
    wrap:  { maxWidth:480, margin:'0 auto', padding:'24px 16px 60px' },
    card:  { background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:20, padding:24, marginBottom:16 },
    cardG: { background:'rgba(16,185,129,0.08)', border:'1px solid rgba(16,185,129,0.3)', borderRadius:20, padding:24, marginBottom:16 },
    btn:   { width:'100%', padding:16, borderRadius:14, border:'none', fontWeight:800, cursor:'pointer', fontFamily:'inherit', fontSize:16 },
    bP:    { background:'linear-gradient(135deg,#7c3aed,#06b6d4)', color:'#fff' },
    bG:    { background:'rgba(255,255,255,0.07)', color:'#9ca3af', border:'1px solid rgba(255,255,255,0.1)' },
    h1:    { fontSize:28, fontWeight:800, marginBottom:4, background:'linear-gradient(90deg,#a78bfa,#06b6d4)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' },
  };

  if (!tenant) return (
    <div style={S.wrap}>
      <div style={{ textAlign:'center', padding:'80px 20px', color:'#6b7280' }}>
        <div style={{ fontSize:64, marginBottom:16 }}>⚡</div>
        <div style={{ fontSize:20, fontWeight:700, color:'#e8e8ff', marginBottom:8 }}>קישור לא תקין</div>
        <div style={{ fontSize:14 }}>פנה לבעל הדירה לקבלת הקישור האישי שלך</div>
      </div>
    </div>
  );

  return (
    <div style={S.wrap}>
      <div style={{ textAlign:'center', marginBottom:28 }}>
        <div style={{ fontSize:48, marginBottom:8 }}>⚡</div>
        <h1 style={S.h1}>שלום {tenant.name}!</h1>
        <div style={{ color:'#6b7280', fontSize:14 }}>{tenant.unit} • קריאה קודמת: {tenant.lastReading}</div>
      </div>

      {!result && (
        <div style={S.card}>
          <div style={{ fontSize:13, color:'#a78bfa', fontWeight:700, marginBottom:12 }}>📸 צלם את מונה החשמל</div>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onFile} style={{ display:'none' }} />
          <button onClick={() => fileRef.current.click()} style={{ ...S.btn, ...S.bP, marginBottom: img?12:0 }}>
            📷 צלם מונה
          </button>
          {img && (
            <>
              <img src={img} alt="meter" style={{ width:'100%', borderRadius:12, maxHeight:260, objectFit:'contain', background:'#000', marginBottom:12 }} />
              {error && <div style={{ color:'#f87171', fontSize:13, marginBottom:12, textAlign:'center' }}>⚠️ {error}</div>}
              <button onClick={doScan} disabled={scanning}
                style={{ ...S.btn, background:scanning?'#374151':'linear-gradient(135deg,#7c3aed,#06b6d4)', color:'#fff', opacity:scanning?0.8:1 }}>
                {scanning ? '🔍 מחשב...' : '🤖 חשב סכום לתשלום'}
              </button>
            </>
          )}
        </div>
      )}

      {result && (
        <div style={S.cardG}>
          <div style={{ textAlign:'center', marginBottom:20 }}>
            <div style={{ fontSize:14, color:'#10b981', fontWeight:700, marginBottom:16 }}>✅ חישוב הושלם!</div>
            <div style={{ fontSize:13, color:'#6b7280', marginBottom:4 }}>סכום לתשלום</div>
            <div style={{ fontSize:56, fontWeight:900, color:'#10b981', lineHeight:1 }}>{ils(result.cost)}</div>
          </div>
          <div style={{ background:'rgba(0,0,0,0.3)', borderRadius:14, padding:16, marginBottom:20 }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              {[
                { label:'קריאה קודמת',  val:tenant.lastReading,       color:'#9ca3af' },
                { label:'קריאה נוכחית', val:result.reading,            color:'#06b6d4' },
                { label:'צריכה',         val:`${result.usage} קוט"ש`, color:'#e8e8ff' },
                { label:'תעריף',         val:`${ils(tenant.rate)}/קוט"ש`, color:'#a78bfa' },
              ].map((x,i) => (
                <div key={i} style={{ textAlign:'center' }}>
                  <div style={{ fontSize:11, color:'#6b7280', marginBottom:4 }}>{x.label}</div>
                  <div style={{ fontSize:15, fontWeight:700, color:x.color }}>{x.val}</div>
                </div>
              ))}
            </div>
          </div>
          <button onClick={() => { setImg(null); setB64(null); setResult(null); }} style={{ ...S.btn, ...S.bG, fontSize:14 }}>
            🔄 צלם שוב
          </button>
        </div>
      )}
      <div style={{ textAlign:'center', fontSize:12, color:'#374151', marginTop:8 }}>מנהל חשמל חכם ⚡</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
