<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="חשמל חכם" />
  <title>מנהל חשמל חכם</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 3px; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
    input[type=month] { color-scheme: dark; }
    @media (max-width: 600px) {
      .nav-label { display: none; }
      .desktop-only { display: none !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = 'electricity_manager_data';
const DATA_VERSION = 'v2';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.version === DATA_VERSION) return parsed;
      localStorage.removeItem(STORAGE_KEY);
    }
  } catch(e) {}
  return null;
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({...data, version: DATA_VERSION})); } catch(e) {}
}

const DEFAULT_TARIFF = { low: 0.3416, high: 0.4021, name: 'תעריף חי - עדכני 2024' };

const DEFAULT_TENANTS = [
  { id: 1, name: 'אורי ספיר', phone: '972545579599', unit: 'דירה 1', active: true, lastReading: 25568 },
  { id: 2, name: 'טל', phone: '972542388318', unit: 'דירה 2', active: true, lastReading: 22722 },
];

function fmt(n) { return '₪' + Number(n).toFixed(2); }

function calcBill(prev, curr, tariff) {
  const usage = curr - prev;
  const low = Math.min(usage, 400);
  const high = Math.max(0, usage - 400);
  const cost = low * tariff.low + high * tariff.high;
  return { usage, low, high, cost };
}

function App() {
  const saved = loadData();
  const [page, setPage] = useState('dashboard');
  const [tenants, setTenants] = useState(saved?.tenants || DEFAULT_TENANTS);
  const [tariff, setTariff] = useState(saved?.tariff || DEFAULT_TARIFF);
  const [readings, setReadings] = useState({});
  const [sentLog, setSentLog] = useState(saved?.sentLog || []);
  const [editTenant, setEditTenant] = useState(null);
  const [newTenant, setNewTenant] = useState({ name: '', phone: '', unit: '' });
  const [triggerMonth, setTriggerMonth] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editTariff, setEditTariff] = useState(false);
  const [tempTariff, setTempTariff] = useState(tariff);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    const now = new Date();
    setTriggerMonth(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
  }, []);

  useEffect(() => {
    saveData({ tenants, tariff, sentLog });
  }, [tenants, tariff, sentLog]);

  function showToast(msg, type='success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  function buildMsg(tenant, calc, month) {
    const kwh = 'קוט"ש';
    const lines = [
      `⚡ *התקזזויות חשמל - ${month}*`,
      '',
      `שלום ${tenant.name}!`,
      '',
      'נא לשלוח צילום מונה החשמל שלך.',
      '',
      '📊 *חישוב חודש קודם:*',
      calc ? `• צריכה: ${calc.usage} ${kwh}` : '• ראשון - אין נתון קודם',
    ];
    if (calc) {
      lines.push(`• תעריף נמוך (${calc.low} ${kwh} × ${fmt(tariff.low)})`);
      lines.push(`• תעריף גבוה (${calc.high} ${kwh} × ${fmt(tariff.high)})`);
      lines.push(`• 💰 *לתשלום: ${fmt(calc.cost)}*`);
    }
    lines.push('', 'תודה! 🙏');
    return lines.join('\n');
  }

  function handleTrigger() {
    const month = triggerMonth;
    const logs = [];
    tenants.filter(t => t.active).forEach(t => {
      const curr = readings[t.id] ? Number(readings[t.id]) : null;
      const calc = curr && curr > t.lastReading ? calcBill(t.lastReading, curr, tariff) : null;
      const msg = buildMsg(t, calc, month);
      const wa = `https://wa.me/${t.phone}?text=${encodeURIComponent(msg)}`;
      const tg = `https://t.me/share/url?url=${encodeURIComponent('.')}&text=${encodeURIComponent(msg)}`;
      logs.push({ id: Date.now()+t.id, tenant: t.name, unit: t.unit, month, msg, calc, wa, tg, sent: new Date().toLocaleString('he-IL') });
    });
    // update lastReading if readings provided
    setTenants(prev => prev.map(t => {
      const curr = readings[t.id] ? Number(readings[t.id]) : null;
      if (curr && curr > t.lastReading) return { ...t, lastReading: curr };
      return t;
    }));
    setReadings({});
    setSentLog(prev => [...logs, ...prev]);
    showToast(`נשלחו ${logs.length} הודעות!`);
    setShowModal(false);
  }

  function saveTenant() {
    setTenants(prev => prev.map(t => t.id === editTenant.id ? editTenant : t));
    setEditTenant(null);
    showToast('הדייר עודכן');
  }

  function addTenant() {
    if (!newTenant.name || !newTenant.phone) { showToast('נא למלא שם וטלפון','error'); return; }
    setTenants(prev => [...prev, { ...newTenant, id: Date.now(), active: true, lastReading: 0 }]);
    setNewTenant({ name: '', phone: '', unit: '' });
    showToast('דייר נוסף');
  }

  function removeTenant(id) {
    setTenants(prev => prev.map(t => t.id === id ? { ...t, active: false } : t));
    showToast('דייר הוסר');
  }

  function saveTariff() {
    setTariff(tempTariff);
    setEditTariff(false);
    showToast('התעריף עודכן');
  }

  const S = {
    page: { minHeight:'100vh', background:'#0a0a0f', color:'#e8e8ff' },
    bg: { position:'fixed', inset:0, background:'radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, #001a33 0%, transparent 60%)', pointerEvents:'none', zIndex:0 },
    header: { position:'sticky', top:0, zIndex:50, borderBottom:'1px solid rgba(120,80,255,0.2)', background:'rgba(10,10,20,0.92)', backdropFilter:'blur(20px)', padding:'0 16px' },
    headerInner: { display:'flex', alignItems:'center', justifyContent:'space-between', height:56 },
    logo: { display:'flex', alignItems:'center', gap:10 },
    logoIcon: { width:34, height:34, background:'linear-gradient(135deg,#7c3aed,#06b6d4)', borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', fontSize:17 },
    logoText: { fontWeight:800, fontSize:16 },
    nav: { display:'flex', gap:2 },
    main: { position:'relative', zIndex:1, maxWidth:800, margin:'0 auto', padding:'20px 16px 100px' },
    card: { background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:16, padding:'20px' },
    cardHighlight: { background:'linear-gradient(135deg,rgba(124,58,237,0.12),rgba(6,182,212,0.08))', border:'1px solid rgba(124,58,237,0.25)', borderRadius:16, padding:'20px' },
    h1: { fontSize:26, fontWeight:800, marginBottom:6, background:'linear-gradient(90deg,#a78bfa,#06b6d4)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' },
    sub: { color:'#6b7280', fontSize:13, marginBottom:20 },
    input: { width:'100%', padding:'10px 14px', borderRadius:10, border:'1px solid rgba(255,255,255,0.1)', background:'rgba(255,255,255,0.05)', color:'#e8e8ff', fontSize:14, outline:'none', fontFamily:'inherit', boxSizing:'border-box' },
    inputFocus: { border:'1px solid #7c3aed', background:'rgba(124,58,237,0.08)' },
    btn: { padding:'11px 20px', borderRadius:10, border:'none', fontWeight:700, cursor:'pointer', fontFamily:'inherit', fontSize:14 },
    btnPrimary: { background:'linear-gradient(135deg,#7c3aed,#06b6d4)', color:'#fff' },
    btnSuccess: { background:'#10b981', color:'#fff' },
    btnGhost: { background:'transparent', color:'#9ca3af', border:'1px solid rgba(255,255,255,0.1)' },
    btnDanger: { background:'transparent', color:'#f87171', border:'1px solid rgba(248,113,113,0.2)' },
    btnNav: (active) => ({ padding:'8px 12px', borderRadius:8, border:'none', cursor:'pointer', fontFamily:'inherit', fontSize:13, fontWeight:600, background: active ? 'rgba(124,58,237,0.25)' : 'transparent', color: active ? '#a78bfa' : '#9ca3af', borderBottom: active ? '2px solid #7c3aed' : '2px solid transparent', transition:'all 0.2s' }),
    grid3: { display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:20 },
    statCard: (color) => ({ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:14, padding:'18px 16px', position:'relative', overflow:'hidden' }),
    row: { display:'flex', alignItems:'center', gap:12 },
    pill: (color) => ({ display:'inline-block', padding:'3px 10px', borderRadius:20, fontSize:11, fontWeight:700, background: color+'22', color }),
  };

  const nav = [
    { id:'dashboard', label:'בקרה', icon:'⚡' },
    { id:'tenants', label:'דיירים', icon:'👥' },
    { id:'tariff', label:'תעריף', icon:'💰' },
    { id:'log', label:'היסטוריה', icon:'📋' },
  ];

  const activeTenants = tenants.filter(t => t.active);

  return (
    <div style={S.page}>
      <div style={S.bg} />

      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', top:16, left:'50%', transform:'translateX(-50%)', background: toast.type==='success' ? '#059669' : '#dc2626', color:'#fff', padding:'10px 24px', borderRadius:50, fontWeight:700, zIndex:9999, boxShadow:'0 4px 24px rgba(0,0,0,0.5)', fontSize:14, whiteSpace:'nowrap' }}>
          {toast.msg}
        </div>
      )}

      {/* Header */}
      <header style={S.header}>
        <div style={S.headerInner}>
          <div style={S.logo}>
            <div style={S.logoIcon}>⚡</div>
            <span style={S.logoText}>מנהל חשמל חכם</span>
          </div>
          <nav style={S.nav}>
            {nav.map(n => (
              <button key={n.id} onClick={() => setPage(n.id)} style={S.btnNav(page===n.id)}>
                {n.icon} <span className="nav-label">{n.label}</span>
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main style={S.main}>

        {/* ===== DASHBOARD ===== */}
        {page === 'dashboard' && (
          <div>
            <h1 style={S.h1}>לוח בקרה</h1>
            <p style={S.sub}>ניהול התקזזויות חשמל חודשי לדיירים</p>

            {/* Stats */}
            <div style={S.grid3}>
              {[
                { label:'דיירים פעילים', value: activeTenants.length, icon:'👥', color:'#7c3aed' },
                { label:'הודעות שנשלחו', value: sentLog.length, icon:'📨', color:'#06b6d4' },
                { label:'תעריף נמוך', value: fmt(tariff.low), icon:'💡', color:'#10b981' },
              ].map((s,i) => (
                <div key={i} style={S.statCard(s.color)}>
                  <div style={{ fontSize:9, color:'#6b7280', marginBottom:4 }}>{s.label}</div>
                  <div style={{ fontSize:18, fontWeight:800, color:s.color }}>{s.value}</div>
                  <div style={{ position:'absolute', bottom:-8, left:-4, fontSize:44, opacity:0.07 }}>{s.icon}</div>
                </div>
              ))}
            </div>

            {/* Trigger */}
            <div style={{ ...S.cardHighlight, marginBottom:16 }}>
              <h2 style={{ fontSize:17, fontWeight:700, marginBottom:8 }}>🚀 שלח טריגר חודשי</h2>
              <p style={{ color:'#9ca3af', fontSize:13, marginBottom:14 }}>לחץ לשליחת "התקזזויות חשמל" לכל הדיירים</p>
              <div style={{ display:'flex', gap:10, flexWrap:'wrap', alignItems:'center' }}>
                <input type="month" value={triggerMonth} onChange={e => setTriggerMonth(e.target.value)}
                  style={{ ...S.input, width:'auto', flex:1, minWidth:140 }} />
                <button onClick={() => setShowModal(true)} style={{ ...S.btn, ...S.btnPrimary, flex:1, minWidth:140 }}>
                  ⚡ שלח התקזזויות
                </button>
              </div>
            </div>

            {/* Readings */}
            <div style={S.card}>
              <h3 style={{ fontSize:15, fontWeight:700, marginBottom:14 }}>📷 הזנת קריאות מונה</h3>
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {activeTenants.map(t => {
                  const curr = readings[t.id] ? Number(readings[t.id]) : null;
                  const calc = curr && curr > t.lastReading ? calcBill(t.lastReading, curr, tariff) : null;
                  return (
                    <div key={t.id} style={{ background:'rgba(255,255,255,0.03)', borderRadius:12, padding:'12px 14px' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                        <div>
                          <span style={{ fontWeight:600, fontSize:14 }}>{t.name}</span>
                          <span style={{ color:'#6b7280', fontSize:12, marginRight:6 }}>{t.unit}</span>
                        </div>
                        <span style={{ color:'#6b7280', fontSize:12 }}>קודם: {t.lastReading}</span>
                      </div>
                      <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                        <input type="number" placeholder="קריאה נוכחית" value={readings[t.id]||''}
                          onChange={e => setReadings(r => ({...r, [t.id]: e.target.value}))}
                          style={{ ...S.input, textAlign:'center' }} />
                        {calc && (
                          <div style={{ color:'#10b981', fontWeight:800, fontSize:16, whiteSpace:'nowrap' }}>
                            {fmt(calc.cost)}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ===== TENANTS ===== */}
        {page === 'tenants' && (
          <div>
            <h1 style={S.h1}>👥 ניהול דיירים</h1>

            {/* Add */}
            <div style={{ ...S.card, marginBottom:16 }}>
              <h3 style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>➕ הוסף דייר חדש</h3>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                <input placeholder="שם הדייר" value={newTenant.name} onChange={e => setNewTenant(n=>({...n,name:e.target.value}))} style={S.input} />
                <input placeholder="מספר דירה / יחידה" value={newTenant.unit} onChange={e => setNewTenant(n=>({...n,unit:e.target.value}))} style={S.input} />
                <input placeholder="טלפון (972501234567)" value={newTenant.phone} onChange={e => setNewTenant(n=>({...n,phone:e.target.value}))} style={S.input} type="tel" />
                <button onClick={addTenant} style={{ ...S.btn, ...S.btnPrimary, width:'100%' }}>הוסף דייר</button>
              </div>
            </div>

            {/* List */}
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {tenants.map(t => (
                <div key={t.id} style={{ ...S.card, opacity: t.active ? 1 : 0.45, border: t.active ? '1px solid rgba(255,255,255,0.08)' : '1px solid rgba(255,0,0,0.15)' }}>
                  {editTenant?.id === t.id ? (
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                      <input value={editTenant.name} onChange={e => setEditTenant(et=>({...et,name:e.target.value}))} style={S.input} placeholder="שם" />
                      <input value={editTenant.unit} onChange={e => setEditTenant(et=>({...et,unit:e.target.value}))} style={S.input} placeholder="דירה" />
                      <input value={editTenant.phone} onChange={e => setEditTenant(et=>({...et,phone:e.target.value}))} style={S.input} placeholder="טלפון" />
                      <input type="number" value={editTenant.lastReading} onChange={e => setEditTenant(et=>({...et,lastReading:Number(e.target.value)}))} style={S.input} placeholder="קריאה אחרונה" />
                      <div style={{ display:'flex', gap:8 }}>
                        <button onClick={saveTenant} style={{ ...S.btn, ...S.btnSuccess, flex:1 }}>שמור</button>
                        <button onClick={() => setEditTenant(null)} style={{ ...S.btn, ...S.btnGhost }}>ביטול</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
                        <div>
                          <div style={{ fontWeight:700, fontSize:15 }}>{t.name}</div>
                          <div style={{ color:'#6b7280', fontSize:13 }}>{t.unit}</div>
                        </div>
                        <div style={{ display:'flex', gap:6 }}>
                          {t.active && <button onClick={() => setEditTenant({...t})} style={{ ...S.btn, ...S.btnGhost, padding:'6px 12px', fontSize:12 }}>✏️</button>}
                          {t.active && <button onClick={() => removeTenant(t.id)} style={{ ...S.btn, ...S.btnDanger, padding:'6px 12px', fontSize:12 }}>🗑️</button>}
                        </div>
                      </div>
                      <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                        <span style={S.pill('#06b6d4')}>📱 {t.phone}</span>
                        <span style={S.pill('#a78bfa')}>מונה: {t.lastReading}</span>
                        {!t.active && <span style={S.pill('#f87171')}>לא פעיל</span>}
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ===== TARIFF ===== */}
        {page === 'tariff' && (
          <div>
            <h1 style={S.h1}>💰 הגדרות תעריף</h1>
            <p style={S.sub}>תעריף חי - רשות החשמל ישראל</p>

            <div style={{ ...S.card, marginBottom:16, maxWidth:460 }}>
              <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
                <div>
                  <label style={{ fontSize:12, color:'#9ca3af', display:'block', marginBottom:6 }}>שם התעריף</label>
                  {editTariff
                    ? <input value={tempTariff.name} onChange={e => setTempTariff(t=>({...t,name:e.target.value}))} style={S.input} />
                    : <div style={{ fontWeight:600 }}>{tariff.name}</div>
                  }
                </div>
                {[
                  { key:'low', label:'תעריף נמוך (עד 400 קוט"ש)', color:'#10b981' },
                  { key:'high', label:'תעריף גבוה (מעל 400 קוט"ש)', color:'#f59e0b' },
                ].map(f => (
                  <div key={f.key}>
                    <label style={{ fontSize:12, color:'#9ca3af', display:'block', marginBottom:6 }}>{f.label}</label>
                    {editTariff
                      ? <input type="number" step="0.0001" value={tempTariff[f.key]} onChange={e => setTempTariff(t=>({...t,[f.key]:parseFloat(e.target.value)}))} style={S.input} />
                      : <div style={{ fontWeight:800, fontSize:24, color:f.color }}>{fmt(tariff[f.key])} <span style={{ fontSize:13, fontWeight:400, color:'#6b7280' }}>לקוט"ש</span></div>
                    }
                  </div>
                ))}
                {editTariff ? (
                  <div style={{ display:'flex', gap:8 }}>
                    <button onClick={saveTariff} style={{ ...S.btn, ...S.btnSuccess, flex:1 }}>שמור</button>
                    <button onClick={() => { setEditTariff(false); setTempTariff(tariff); }} style={{ ...S.btn, ...S.btnGhost }}>ביטול</button>
                  </div>
                ) : (
                  <button onClick={() => { setEditTariff(true); setTempTariff(tariff); }} style={{ ...S.btn, background:'rgba(124,58,237,0.12)', color:'#a78bfa', border:'1px solid rgba(124,58,237,0.3)', width:'100%' }}>
                    ✏️ עדכן תעריף
                  </button>
                )}
              </div>
            </div>

            {/* Quick calc */}
            <div style={{ ...S.card, maxWidth:460 }}>
              <h3 style={{ fontSize:15, fontWeight:700, marginBottom:14 }}>🧮 מחשבון מהיר</h3>
              <CalcWidget tariff={tariff} fmt={fmt} calcBill={calcBill} />
            </div>
          </div>
        )}

        {/* ===== LOG ===== */}
        {page === 'log' && (
          <div>
            <h1 style={S.h1}>📋 היסטוריית שליחות</h1>
            {sentLog.length === 0 ? (
              <div style={{ textAlign:'center', padding:'60px 20px', color:'#6b7280' }}>
                <div style={{ fontSize:48, marginBottom:12 }}>📭</div>
                <p>עדיין לא נשלחו הודעות</p>
              </div>
            ) : (
              <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                {sentLog.map(log => (
                  <div key={log.id} style={S.card}>
                    <div style={{ display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:8, marginBottom:12 }}>
                      <div>
                        <span style={{ fontWeight:700, fontSize:15 }}>{log.tenant}</span>
                        <span style={{ color:'#6b7280', fontSize:12, marginRight:8 }}>{log.unit} • {log.month}</span>
                      </div>
                      <div style={{ display:'flex', gap:8 }}>
                        <a href={log.wa} target="_blank" rel="noopener noreferrer"
                          style={{ padding:'6px 12px', borderRadius:8, background:'#25d366', color:'#fff', textDecoration:'none', fontSize:12, fontWeight:700 }}>
                          WhatsApp ▶
                        </a>
                        <a href={log.tg} target="_blank" rel="noopener noreferrer"
                          style={{ padding:'6px 12px', borderRadius:8, background:'#229ed9', color:'#fff', textDecoration:'none', fontSize:12, fontWeight:700 }}>
                          Telegram ▶
                        </a>
                      </div>
                    </div>
                    {log.calc && (
                      <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8, background:'rgba(255,255,255,0.03)', borderRadius:10, padding:'10px 12px', marginBottom:10 }}>
                        {[
                          { label:'צריכה', val:`${log.calc.usage} קוט"ש` },
                          { label:'נמוך', val:`${log.calc.low} קוט"ש` },
                          { label:'גבוה', val:`${log.calc.high} קוט"ש` },
                          { label:'לתשלום', val:fmt(log.calc.cost), green:true },
                        ].map((c,i) => (
                          <div key={i}>
                            <div style={{ fontSize:10, color:'#6b7280' }}>{c.label}</div>
                            <div style={{ fontWeight:700, color: c.green ? '#10b981' : '#e8e8ff', fontSize: c.green ? 15 : 13 }}>{c.val}</div>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{ background:'#000', borderRadius:10, padding:'10px 14px', fontSize:12, color:'#9ca3af', whiteSpace:'pre-wrap', lineHeight:1.8 }}>
                      {log.msg}
                    </div>
                    <div style={{ marginTop:8, fontSize:11, color:'#4b5563' }}>נשלח: {log.sent}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </main>

      {/* Modal */}
      {showModal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', backdropFilter:'blur(8px)', zIndex:100, display:'flex', alignItems:'flex-end', justifyContent:'center', padding:16 }}>
          <div style={{ background:'#111827', border:'1px solid rgba(124,58,237,0.4)', borderRadius:20, padding:24, width:'100%', maxWidth:460, marginBottom:8 }}>
            <h2 style={{ fontWeight:800, fontSize:19, marginBottom:6 }}>⚡ שלח התקזזויות חשמל</h2>
            <p style={{ color:'#6b7280', fontSize:13, marginBottom:16 }}>הודעות ישלחו ל-{activeTenants.length} דיירים פעילים</p>
            <div style={{ background:'rgba(255,255,255,0.03)', borderRadius:12, padding:14, marginBottom:16 }}>
              {activeTenants.map(t => {
                const curr = readings[t.id] ? Number(readings[t.id]) : null;
                const calc = curr && curr > t.lastReading ? calcBill(t.lastReading, curr, tariff) : null;
                return (
                  <div key={t.id} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid rgba(255,255,255,0.05)', fontSize:14 }}>
                    <span>{t.name} <span style={{ color:'#6b7280', fontSize:12 }}>({t.unit})</span></span>
                    <span style={{ color: calc ? '#10b981' : '#6b7280', fontWeight:700 }}>
                      {calc ? fmt(calc.cost) : 'ללא קריאה'}
                    </span>
                  </div>
                );
              })}
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={handleTrigger} style={{ ...S.btn, ...S.btnPrimary, flex:1, fontSize:16, padding:'13px' }}>
                ✅ אשר ושלח
              </button>
              <button onClick={() => setShowModal(false)} style={{ ...S.btn, ...S.btnGhost, padding:'13px 16px' }}>
                ביטול
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CalcWidget({ tariff, fmt, calcBill }) {
  const [prev, setPrev] = useState(1000);
  const [curr, setCurr] = useState(1180);
  const calc = curr > prev ? calcBill(prev, curr, tariff) : null;
  return (
    <div>
      <div style={{ display:'flex', gap:10, marginBottom:12 }}>
        {[{label:'קריאה קודמת',val:prev,set:setPrev},{label:'קריאה נוכחית',val:curr,set:setCurr}].map(f=>(
          <div key={f.label} style={{ flex:1 }}>
            <label style={{ fontSize:12, color:'#9ca3af', display:'block', marginBottom:4 }}>{f.label}</label>
            <input type="number" value={f.val} onChange={e=>f.set(Number(e.target.value))}
              style={{ width:'100%', padding:'9px 12px', borderRadius:8, border:'1px solid rgba(255,255,255,0.1)', background:'rgba(255,255,255,0.05)', color:'#e8e8ff', fontSize:14, outline:'none', fontFamily:'inherit', boxSizing:'border-box' }} />
          </div>
        ))}
      </div>
      {calc && (
        <div style={{ background:'rgba(16,185,129,0.1)', border:'1px solid rgba(16,185,129,0.25)', borderRadius:12, padding:14 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, fontSize:13 }}>
            <div>צריכה: <strong>{calc.usage} קוט"ש</strong></div>
            <div>תעריף נמוך: <strong>{calc.low} קוט"ש</strong></div>
            <div>תעריף גבוה: <strong>{calc.high} קוט"ש</strong></div>
            <div style={{ color:'#10b981', fontWeight:800, fontSize:16 }}>לתשלום: {fmt(calc.cost)}</div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
